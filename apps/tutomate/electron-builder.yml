appId: com.student-management.app
productName: TutorMate
copyright: Copyright © 2024-2026 TutorMate

electronLanguages:
  - ko
  - en-US

directories:
  output: release
  buildResources: ../../packages/electron-shared/build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/@tailwindcss/**"
  - "!node_modules/tailwindcss/**"
  - "!node_modules/lightningcss/**"

publish:
  provider: github
  owner: rlawlghkd12
  repo: tutomate
  channel: latest

mac:
  category: public.app-category.education
  icon: ../../packages/electron-shared/build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal

win:
  icon: ../../packages/electron-shared/build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  artifactName: "TutorMate-Setup-${version}.${ext}"
  oneClick: true
  perMachine: false
  language: 1042
  installerLanguages:
    - ko

protocols:
  - name: TutorMate
    schemes:
      - tutomate

linux:
  target:
    - AppImage
  category: Education
