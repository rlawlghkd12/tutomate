appId: com.student-management.app
productName: TutorMate
copyright: Copyright © 2024-2026 TutorMate

electronLanguages:
  - ko
  - en-US

directories:
  output: release
  buildResources: ../../packages/electron-shared/build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/@tailwindcss/**"
  - "!node_modules/tailwindcss/**"
  - "!node_modules/lightningcss/**"
  - "!node_modules/lightningcss-*/**"

# llama-server 바이너리·AI 모델은 설치 파일에 번들하지 않음 (설치 파일 비대화 방지).
# 둘 다 첫 실행 시 사용자가 직접 다운로드 → userData/AI/ 에 저장.

publish:
  provider: github
  owner: rlawlghkd12
  repo: tutomate
  channel: latest

mac:
  category: public.app-category.education
  icon: ../../packages/electron-shared/build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal

win:
  icon: ../../packages/electron-shared/build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  artifactName: "TutorMate-Setup-${version}.${ext}"
  oneClick: true
  perMachine: false
  language: 1042
  installerLanguages:
    - ko

protocols:
  - name: TutorMate
    schemes:
      - tutomate

linux:
  target:
    - AppImage
  category: Education
