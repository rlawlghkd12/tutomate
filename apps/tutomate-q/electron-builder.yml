appId: com.tutomate-q.app
productName: TutorMate Q
copyright: Copyright © 2024-2026 TutorMate

directories:
  output: release
  buildResources: ../../packages/electron-shared/build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/@tailwindcss/**"
  - "!node_modules/tailwindcss/**"
  - "!node_modules/lightningcss/**"
  - "!node_modules/lightningcss-*/**"

# llama-server 바이너리·AI 모델은 설치 파일에 번들하지 않음 (설치 파일 비대화 방지).
# 둘 다 첫 실행 시 사용자가 직접 다운로드 → userData/AI/ 에 저장.

publish:
  provider: github
  owner: rlawlghkd12
  repo: tutomate
  channel: q-latest

mac:
  artifactName: "TutorMate-Q-${version}-${arch}-mac.${ext}"
  category: public.app-category.education
  icon: ../../packages/electron-shared/build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal

win:
  icon: ../../packages/electron-shared/build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  artifactName: "TutorMate-Q-Setup-${version}.${ext}"
  oneClick: true
  perMachine: false
  language: 1042
  installerLanguages:
    - ko
  # AI 엔진(llama-server.exe)이 요구하는 VC++ 2015-2022 재배포 패키지를
  # 인스톨 시점에 자동 설치 (이미 깔린 경우 skip).
  # build/vc_redist.x64.exe는 빌드 직전 scripts/fetch-vc-redist.sh가 받아둠.
  include: ../../packages/electron-shared/build/installer.nsh

protocols:
  - name: TutorMate Q
    schemes:
      - tutomate-q

linux:
  target:
    - AppImage
  category: Education
