appId: com.tutomate-q.app
productName: TutorMate
copyright: Copyright © 2024-2026 TutorMate

directories:
  output: release-q
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*

publish:
  provider: github
  owner: rlawlghkd12
  repo: tutomate

mac:
  category: public.app-category.education
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  language: 1042
  installerLanguages:
    - ko

linux:
  target:
    - AppImage
  category: Education
