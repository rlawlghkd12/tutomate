name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - 'q-v*'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Which variant to build'
        required: true
        default: 'tutomate'
        type: choice
        options:
          - tutomate
          - tutomate-q

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_name: macos
          - os: windows-latest
            platform: win
            artifact_name: windows

    runs-on: ${{ matrix.os }}

    env:
      # Determine variant from tag or workflow input
      VARIANT: ${{ startsWith(github.ref, 'refs/tags/q-v') && 'tutomate-q' || inputs.variant || 'tutomate' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm --filter @tutomate/${{ env.VARIANT == 'tutomate-q' && 'app-q' || 'app' }} electron:build:${{ matrix.platform }} -- --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VARIANT }}-${{ matrix.artifact_name }}
          path: |
            apps/${{ env.VARIANT }}/release/**/*.dmg
            apps/${{ env.VARIANT }}/release/**/*.zip
            apps/${{ env.VARIANT }}/release/**/*.exe
            apps/${{ env.VARIANT }}/release/**/*.yml
            apps/${{ env.VARIANT }}/release/**/*.yaml
